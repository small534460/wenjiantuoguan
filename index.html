<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=1.0,user-scalable=yes" />
  <title>GitHub 文件管理器</title>
  <meta name="description" content="Small 3 的GitHub文件管理系统" />
  <style>
    <!--（此处保留你的全部1400多行CSS样式，不再赘述，原样复制即可）-->
    /* ... */
  </style>
</head>
<body>
  <!-- ...完整保留你的全部HTML布局/注释/配置/组件... -->
  <!-- ...一直到script标签全部不变... -->
  <script>
    // ================== 全局变量 ==================
    let currentPath = '';
    let currentFile = null;
    let currentPreviewFile = null;

    // ...【你原有所有工具函数、类型判断、配置保存、API、预览、编辑等代码均保持原样】...

    // ================== 上传相关分片参数 ==================
    const MAX_SINGLE_FILE_SIZE = 25 * 1024 * 1024;    // 25MB
    const MAX_TOTAL_FILE_SIZE  = 512 * 1024 * 1024;   // 512MB

    // ================== 文件上传功能（增强分片支持） ==================
    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('uploadArea').classList.add('dragover');
    }
    function handleDragLeave(e) {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('uploadArea').classList.remove('dragover');
    }
    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('uploadArea').classList.remove('dragover');
      const files = e.dataTransfer.files;
      handleFiles(files);
    }
    function handleFileSelect(e) {
      const files = e.target.files;
      handleFiles(files);
    }

    // ========== 分片上传+批量 ==============
    async function handleFiles(files) {
      const fileList = document.getElementById('uploadFileList');
      fileList.innerHTML = '';
      fileList.style.display = 'block';
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const fileItem = document.createElement('div');
        fileItem.className = 'upload-file-item';
        fileItem.innerHTML = `
          <span>${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
          <span style="color: var(--accent-green);">等待上传...</span>
        `;
        fileList.appendChild(fileItem);

        if (file.size > MAX_TOTAL_FILE_SIZE) {
          fileItem.querySelector('span:last-child').textContent = '文件过大(>512MB)';
          fileItem.querySelector('span:last-child').style.color = 'var(--accent-red)';
          continue;
        }

        try {
          if (file.size > MAX_SINGLE_FILE_SIZE) {
            fileItem.querySelector('span:last-child').textContent = '分片上传中...';
            await uploadFileInChunks(file, (percent) => {
              fileItem.querySelector('span:last-child').textContent = `分片上传中 ${percent}% ...`;
            });
          } else {
            await uploadFile(file);
          }
          fileItem.querySelector('span:last-child').textContent = '上传成功';
          fileItem.querySelector('span:last-child').style.color = 'var(--accent-green)';
        } catch(e) {
          fileItem.querySelector('span:last-child').textContent = '上传失败';
          fileItem.querySelector('span:last-child').style.color = 'var(--accent-red)';
        }
      }
      setTimeout(() => {
        fileList.style.display = 'none';
        loadFiles(currentPath);
      }, 2000);
    }

    // ============== 【增强版】uploadFile：大文件自动分片 =================
    async function uploadFile(file) {
      const token = document.getElementById('token').value;
      if (!token) {
        alert('请先输入GitHub访问令牌！');
        return;
      }
      const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
      if (file.size > MAX_SINGLE_FILE_SIZE) {
        // 分片上传（主入口只做兼容，实际由handleFiles负责进度显示，可重入）
        await uploadFileInChunks(file);
        return;
      }
      // 原有小文件上传
      const reader = new FileReader();
      return new Promise((resolve, reject) => {
        reader.onload = async function(e) {
          try {
            const content = btoa(new Uint8Array(e.target.result).reduce((data, byte) => data + String.fromCharCode(byte), ''));
            const data = {
              message: `上传文件 ${file.name}`,
              content: content,
              branch: 'main'
            };
            const result = await githubApiRequest(`contents/${filePath}`, 'PUT', data);
            if (result) {
              resolve();
            } else {
              reject(new Error('上传失败'));
            }
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    // ============= 新增：大文件分片上传主函数 ==============
    async function uploadFileInChunks(file, onProgress) {
      const token = document.getElementById('token').value;
      if (!token) {
        alert('请先输入GitHub访问令牌！');
        return;
      }
      const fileName = file.name;
      const dirPath = currentPath ? `${currentPath}/` : '';
      const totalChunks = Math.ceil(file.size / MAX_SINGLE_FILE_SIZE);
      if (totalChunks > 100) {
        alert('单文件不能超过100分片（即最大512MB）');
        throw new Error('chunk limit');
      }
      for (let i = 0; i < totalChunks; i++) {
        const start = i * MAX_SINGLE_FILE_SIZE;
        const end = Math.min(file.size, (i + 1) * MAX_SINGLE_FILE_SIZE);
        const chunk = file.slice(start, end);
        const partFileName = `${fileName}.part${i+1}`;
        const filePath = `${dirPath}${partFileName}`;
        await uploadChunk(chunk, filePath, i+1, totalChunks, fileName);
        if (onProgress) onProgress(Math.round((i + 1) / totalChunks * 100));
      }
    }

    // ============= 新增：上传某一分片 =============
    async function uploadChunk(chunk, filePath, partIdx, totalChunks, originName) {
      const token = document.getElementById('token').value;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const content = btoa(new Uint8Array(e.target.result).reduce((data, byte) => data + String.fromCharCode(byte), ''));
          const data = {
            message: `上传大文件分段：${originName} 的第${partIdx}段（共${totalChunks}段）`,
            content: content,
            branch: 'main'
          };
          const result = await githubApiRequest(`contents/${filePath}`, 'PUT', data);
          if (result) resolve();
          else reject(new Error(`分片${partIdx}上传失败`));
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(chunk);
      });
    }

    // ================== 其余所有功能脚本不变，全部按你原本的 ==================
    // 如文本、图片、音频预览，编辑，删除等全部功能全保留！
    // ...你之前的所有函数和页面初始化代码...

    document.addEventListener('DOMContentLoaded', function() {
      loadConfig();
      const avatarImg = document.querySelector('.avatar-img');
      const avatarFallback = document.querySelector('.avatar-fallback');
      if (avatarImg && avatarFallback) {
        if (avatarImg.complete) {
          if (avatarImg.naturalWidth === 0) {
            avatarFallback.style.display = 'flex';
          } else {
            avatarImg.classList.add('loaded');
            avatarFallback.style.display = 'none';
          }
        } else {
          avatarImg.addEventListener('load', function() {
            this.classList.add('loaded');
            avatarFallback.style.display = 'none';
          });
          avatarImg.addEventListener('error', function() {
            this.style.display = 'none';
            avatarFallback.style.display = 'flex';
          });
        }
      }
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      uploadArea.addEventListener('click', function() {
        fileInput.click();
      });
    });
  </script>
</body>
</html>
