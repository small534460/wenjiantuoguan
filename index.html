<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=1.0,user-scalable=yes" />
  <title>双模式文件管理器</title>
  <meta name="description" content="Small 3 的双模式文件管理系统" />
  <style>
    /* ================== CSS变量定义 ================== */
    :root{
      --accent: #60a5fa;
      --accent-2: #3b82f6;
      --accent-green: #10B981;
      --accent-green-hover: #059669;
      --accent-red: #EF4444;
      --accent-red-hover: #DC2626;
      --accent-purple: #8B5CF6;
      --accent-purple-2: #7C3AED;
      --accent-orange: #F59E0B;
      --accent-orange-hover: #D97706;
      --muted: rgba(230,238,248,0.6);
      --glass: rgba(255,255,255,0.02);
      --radius: 12px;
    }
    
    /* ================== 基础样式 ================== */
    html, body { 
      margin: 0;
      padding: 0;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
    }
    
    /* ================== 背景图片设置区域 ================== */
    body{
      background:
        linear-gradient(180deg, rgba(7,16,38,0.6) 0%, rgba(7,16,38,0.6) 100%),
        url('https://i.mituw.com/imgs/2026/02/16/ca72241243868693.jpg') center/cover no-repeat fixed;
      color: #e6eef8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      padding: 20px 16px;
      box-sizing: border-box;
      display: block !important;
    }
    
    /* ================== 移动端修复 ================== */
    @media (max-width: 768px) {
      body {
        padding: 16px 12px;
        min-height: 100vh;
        height: auto;
        display: block !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
      }
      
      .wrap {
        margin: 0 auto !important;
        transform: none !important;
        max-height: none !important;
      }
    }
    
    /* ================== 主容器样式 ================== */
    .wrap{
      width: 100%;
      max-width: 880px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 8px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(6px);
      margin: 0 auto;
      box-sizing: border-box;
      min-height: auto;
    }
    
    /* ================== 头部样式 ================== */
    header{
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    /* ================== 头像样式 ================== */
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(96,165,250,0.12);
      flex: 0 0 64px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(96,165,250,0.3);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    
    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      display: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    .avatar-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      position: absolute;
      top: 0;
      left: 0;
    }
    
    /* 图片加载成功时的状态 */
    .avatar-img.loaded {
      display: block;
    }
    
    .avatar-img.loaded + .avatar-fallback {
      display: none;
    }
    
    .title-container {
      flex: 1;
      min-width: 200px;
    }
    
    h1{
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.6px;
      word-break: break-word;
    }
    
    .subtitle{
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    
    .content{
      margin-top: 18px;
    }
    
    /* ================== 模式切换按钮样式 ================== */
    .mode-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .mode-btn {
      flex: 1;
      min-width: 200px;
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid rgba(96,165,250,0.2);
      background: linear-gradient(135deg, rgba(96,165,250,0.1), rgba(59,130,246,0.05));
      color: #e6eef8;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      backdrop-filter: blur(5px);
    }
    
    .mode-btn:hover {
      background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(59,130,246,0.1));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(96,165,250,0.2);
    }
    
    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
    }
    
    .mode-btn.github-mode {
      background: linear-gradient(135deg, rgba(24,24,27,0.8), rgba(39,39,42,0.8));
      border-color: rgba(63,63,70,0.5);
    }
    
    .mode-btn.github-mode:hover {
      background: linear-gradient(135deg, rgba(39,39,42,0.9), rgba(63,63,70,0.9));
    }
    
    .mode-btn.github-mode.active {
      background: linear-gradient(135deg, #333, #444);
      border-color: #666;
      box-shadow: 0 0 0 3px rgba(113,113,122,0.2);
    }
    
    .mode-btn.cloud-mode {
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(124,58,237,0.05));
      border-color: rgba(139,92,246,0.2);
    }
    
    .mode-btn.cloud-mode:hover {
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(124,58,237,0.1));
    }
    
    .mode-btn.cloud-mode.active {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple-2));
      border-color: var(--accent-purple-2);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
    }
    
    .mode-btn i {
      margin-right: 8px;
      font-size: 18px;
    }
    
    /* ================== 配置区域样式 ================== */
    .config-section {
      background: var(--glass);
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      color: #dceafc;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    .config-section.hidden {
      display: none;
    }
    
    .config-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    
    .config-item {
      background: rgba(96,165,250,0.1);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(96,165,250,0.2);
    }
    
    .config-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    
    .config-value {
      font-size: 14px;
      color: #f3f9ff;
      font-weight: 600;
      word-break: break-all;
    }
    
    .config-value .locked {
      padding: 6px 8px;
      border-radius: 4px;
      background: rgba(7,16,38,0.4);
      color: #e6eef8;
      border: 1px solid rgba(96,165,250,0.3);
      font-family: inherit;
      font-size: 14px;
    }
    
    .config-value input {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid rgba(96,165,250,0.3);
      background: rgba(7,16,38,0.4);
      color: #e6eef8;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }
    
    .config-value input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(96,165,250,0.1);
    }
    
    .config-value textarea {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid rgba(96,165,250,0.3);
      background: rgba(7,16,38,0.4);
      color: #e6eef8;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      min-height: 60px;
    }
    
    .config-value select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid rgba(96,165,250,0.3);
      background: rgba(7,16,38,0.4);
      color: #e6eef8;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }
    
    /* ================== 按钮样式 ================== */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-2), #2563eb);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e6eef8;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }
    
    .btn-success {
      background: linear-gradient(135deg, var(--accent-green), var(--accent-green-hover));
      color: white;
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, var(--accent-green-hover), #047857);
      transform: translateY(-1px);
    }
    
    .btn-warning {
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-hover));
      color: white;
    }
    
    .btn-warning:hover {
      background: linear-gradient(135deg, var(--accent-orange-hover), #b45309);
      transform: translateY(-1px);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, var(--accent-red), var(--accent-red-hover));
      color: white;
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, var(--accent-red-hover), #b91c1c);
      transform: translateY(-1px);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    /* ================== 文件管理器样式 ================== */
    .file-manager {
      margin-top: 20px;
    }
    
    .file-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    
    .file-list {
      background: var(--glass);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.03);
    }
    
    .file-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s ease;
    }
    
    .file-item:hover {
      background: rgba(96,165,250,0.05);
    }
    
    .file-item:last-child {
      border-bottom: none;
    }
    
    .file-icon {
      margin-right: 12px;
      font-size: 20px;
      color: var(--accent);
    }
    
    .file-info {
      flex: 1;
      min-width: 0;
    }
    
    .file-name {
      font-weight: 600;
      color: #e6eef8;
      margin-bottom: 4px;
      word-break: break-all;
    }
    
    .file-meta {
      font-size: 12px;
      color: var(--muted);
    }
    
    .file-size {
      margin-right: 12px;
    }
    
    .file-date {
      font-size: 11px;
    }
    
    .file-actions-cell {
      display: flex;
      gap: 8px;
    }
    
    .btn-icon {
      padding: 6px 8px;
      background: rgba(96,165,250,0.1);
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 4px;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-icon:hover {
      background: rgba(96,165,250,0.2);
      transform: translateY(-1px);
    }
    
    .btn-download {
      color: var(--accent-green);
      border-color: rgba(16,185,129,0.2);
      background: rgba(16,185,129,0.1);
    }
    
    .btn-delete {
      color: var(--accent-red);
      border-color: rgba(239,68,68,0.2);
      background: rgba(239,68,68,0.1);
    }
    
    .btn-view {
      color: var(--accent-purple);
      border-color: rgba(139,92,246,0.2);
      background: rgba(139,92,246,0.1);
    }
    
    /* ================== 加载状态 ================== */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(96,165,250,0.3);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ================== 通知消息 ================== */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      background: rgba(7,16,38,0.9);
      border: 1px solid rgba(96,165,250,0.3);
      backdrop-filter: blur(10px);
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .notification.success {
      border-color: var(--accent-green);
      background: rgba(6,78,59,0.9);
    }
    
    .notification.error {
      border-color: var(--accent-red);
      background: rgba(127,29,29,0.9);
    }
    
    .notification.warning {
      border-color: var(--accent-orange);
      background: rgba(146,64,14,0.9);
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* ================== 状态指示器 ================== */
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    
    .status-online {
      background: var(--accent-green);
      box-shadow: 0 0 0 2px rgba(16,185,129,0.3);
    }
    
    .status-offline {
      background: var(--accent-red);
      box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
    }
    
    /* ================== 文件上传区 ================== */
    .upload-area {
      border: 2px dashed rgba(96,165,250,0.3);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      background: rgba(96,165,250,0.05);
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .upload-area:hover {
      background: rgba(96,165,250,0.1);
      border-color: var(--accent);
    }
    
    .upload-area.dragover {
      background: rgba(96,165,250,0.15);
      border-color: var(--accent-2);
      transform: scale(1.02);
    }
    
    .upload-area input {
      display: none;
    }
    
    .upload-icon {
      font-size: 40px;
      color: var(--accent);
      margin-bottom: 10px;
    }
    
    .upload-text {
      color: var(--muted);
      margin-bottom: 10px;
    }
    
    .upload-hint {
      font-size: 12px;
      color: rgba(230,238,248,0.5);
    }
    
    /* ================== 响应式调整 ================== */
    @media (max-width: 640px) {
      .mode-btn {
        min-width: 100%;
      }
      
      .file-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      
      .file-actions-cell {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="avatar">
        <img id="avatarImg" src="https://avatars.githubusercontent.com/u/99296962?v=4" 
             onerror="this.style.display='none'" 
             onload="this.classList.add('loaded')" class="avatar-img">
        <div class="avatar-fallback">S3</div>
      </div>
      <div class="title-container">
        <h1>双模式文件管理器</h1>
        <div class="subtitle">
          GitHub仓库模式 <span class="status-indicator status-online"></span> | 云存储模式 <span class="status-indicator status-online"></span>
        </div>
      </div>
    </header>
    
    <div class="content">
      <!-- 模式选择器 -->
      <div class="mode-selector">
        <button class="mode-btn github-mode active" data-mode="github">
          <i>📦</i> GitHub仓库模式
        </button>
        <button class="mode-btn cloud-mode" data-mode="cloud">
          <i>☁️</i> 云存储模式
        </button>
      </div>
      
      <!-- GitHub模式配置 -->
      <div class="config-section" id="githubConfig">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
          <i>⚙️</i>
          <strong>GitHub配置</strong>
        </div>
        <div class="config-info">
          <div class="config-item">
            <div class="config-label">GitHub Token</div>
            <div class="config-value">
              <input type="text" id="githubToken" placeholder="请输入你的GitHub Token">
            </div>
          </div>
          <div class="config-item">
            <div class="config-label">仓库名</div>
            <div class="config-value">
              <input type="text" id="githubRepo" placeholder="username/repository">
            </div>
          </div>
          <div class="config-item">
            <div class="config-label">分支</div>
            <div class="config-value">
              <input type="text" id="githubBranch" value="main" placeholder="main">
            </div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveConfig('github')">保存配置</button>
          <button class="btn btn-secondary" onclick="testGitHubConnection()">测试连接</button>
          <button class="btn btn-success" onclick="loadGitHubFiles()">刷新文件</button>
        </div>
      </div>
      
      <!-- 云存储模式配置 -->
      <div class="config-section hidden" id="cloudConfig">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
          <i>⚙️</i>
          <strong>云存储配置</strong>
        </div>
        <div class="config-info">
          <div class="config-item">
            <div class="config-label">GoIndex/网盘地址</div>
            <div class="config-value">
              <input type="text" id="cloudUrl" placeholder="https://example.com">
            </div>
          </div>
          <div class="config-item">
            <div class="config-label">访问密码（如有）</div>
            <div class="config-value">
              <input type="password" id="cloudPassword" placeholder="可选">
            </div>
          </div>
          <div class="config-item">
            <div class="config-label">根目录路径</div>
            <div class="config-value">
              <input type="text" id="cloudPath" placeholder="/" value="/">
            </div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveConfig('cloud')">保存配置</button>
          <button class="btn btn-secondary" onclick="testCloudConnection()">测试连接</button>
          <button class="btn btn-success" onclick="loadCloudFiles()">刷新文件</button>
        </div>
      </div>
      
      <!-- 文件管理器区域 -->
      <div class="file-manager" id="fileManager">
        <div class="file-actions">
          <button class="btn btn-warning" onclick="createFolder()">
            <i>📁</i> 新建文件夹
          </button>
          <button class="btn btn-success" onclick="uploadFile()">
            <i>📤</i> 上传文件
          </button>
          <div style="flex: 1"></div>
          <div style="color: var(--muted); font-size: 13px;">
            当前模式: <span id="currentMode">GitHub仓库模式</span>
          </div>
        </div>
        
        <div class="upload-area" id="uploadArea" onclick="triggerFileInput()">
          <div class="upload-icon">📁</div>
          <div class="upload-text">点击或拖拽文件到此处上传</div>
          <div class="upload-hint">支持大文件上传到云存储</div>
          <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
        </div>
        
        <div class="file-list" id="fileList">
          <div class="loading">
            <div class="loading-spinner"></div>
            <div>加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 当前模式
    let currentMode = 'github'; // 'github' 或 'cloud'
    
    // 配置文件
    let config = {
      github: {
        token: '',
        repo: '',
        branch: 'main'
      },
      cloud: {
        url: '',
        password: '',
        path: '/'
      }
    };
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 从本地存储加载配置
      loadConfig();
      
      // 设置模式切换事件
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          switchMode(this.dataset.mode);
        });
      });
      
      // 初始化上传区域拖放功能
      initUploadArea();
      
      // 自动测试GitHub连接
      if (config.github.token && config.github.repo) {
        setTimeout(() => testGitHubConnection(), 1000);
      }
    });
    
    // 模式切换函数
    function switchMode(mode) {
      currentMode = mode;
      
      // 更新按钮状态
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      // 更新配置显示
      document.getElementById('githubConfig').classList.toggle('hidden', mode !== 'github');
      document.getElementById('cloudConfig').classList.toggle('hidden', mode !== 'cloud');
      
      // 更新当前模式显示
      document.getElementById('currentMode').textContent = 
        mode === 'github' ? 'GitHub仓库模式' : '云存储模式';
      
      // 加载对应模式的文件列表
      if (mode === 'github' && config.github.token && config.github.repo) {
        loadGitHubFiles();
      } else if (mode === 'cloud' && config.cloud.url) {
        loadCloudFiles();
      }
    }
    
    // 保存配置
    function saveConfig(mode) {
      if (mode === 'github') {
        config.github = {
          token: document.getElementById('githubToken').value,
          repo: document.getElementById('githubRepo').value,
          branch: document.getElementById('githubBranch').value || 'main'
        };
      } else {
        config.cloud = {
          url: document.getElementById('cloudUrl').value,
          password: document.getElementById('cloudPassword').value,
          path: document.getElementById('cloudPath').value || '/'
        };
      }
      
      localStorage.setItem('fileManagerConfig', JSON.stringify(config));
      showNotification('配置已保存', 'success');
    }
    
    // 加载配置
    function loadConfig() {
      const saved = localStorage.getItem('fileManagerConfig');
      if (saved) {
        config = JSON.parse(saved);
        document.getElementById('githubToken').value = config.github.token || '';
        document.getElementById('githubRepo').value = config.github.repo || '';
        document.getElementById('githubBranch').value = config.github.branch || 'main';
        document.getElementById('cloudUrl').value = config.cloud.url || '';
        document.getElementById('cloudPassword').value = config.cloud.password || '';
        document.getElementById('cloudPath').value = config.cloud.path || '/';
      }
    }
    
    // 测试GitHub连接
    async function testGitHubConnection() {
      const token = document.getElementById('githubToken').value;
      const repo = document.getElementById('githubRepo').value;
      
      if (!token || !repo) {
        showNotification('请填写GitHub Token和仓库名', 'error');
        return;
      }
      
      try {
        showNotification('测试连接中...', 'warning');
        
        const response = await fetch(`https://api.github.com/repos/${repo}`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          showNotification(`连接成功！仓库: ${data.name}`, 'success');
        } else {
          throw new Error('连接失败');
        }
      } catch (error) {
        showNotification('连接失败，请检查配置', 'error');
      }
    }
    
    // 测试云存储连接
    async function testCloudConnection() {
      const url = document.getElementById('cloudUrl').value;
      
      if (!url) {
        showNotification('请填写云存储地址', 'error');
        return;
      }
      
      try {
        showNotification('测试连接中...', 'warning');
        
        // 这里需要根据你的GoIndex/云存储API进行调整
        const testUrl = `${url.replace(/\/$/, '')}/api/status`; // 示例API端点
        const response = await fetch(testUrl);
        
        if (response.ok) {
          showNotification('连接成功！', 'success');
        } else {
          // 尝试其他可能的API端点
          const altResponse = await fetch(url);
          if (altResponse.ok) {
            showNotification('连接成功！', 'success');
          } else {
            throw new Error('连接失败');
          }
        }
      } catch (error) {
        showNotification('连接失败，请检查地址是否正确', 'error');
      }
    }
    
    // 加载GitHub文件列表
    async function loadGitHubFiles() {
      if (!config.github.token || !config.github.repo) {
        showNotification('请先配置GitHub信息', 'error');
        return;
      }
      
      showNotification('加载GitHub文件列表中...', 'warning');
      
      try {
        const response = await fetch(
          `https://api.github.com/repos/${config.github.repo}/contents?ref=${config.github.branch}`, 
          {
            headers: {
              'Authorization': `token ${config.github.token}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          }
        );
        
        if (response.ok) {
          const files = await response.json();
          renderFileList(files, 'github');
          showNotification('文件列表已更新', 'success');
        } else {
          throw new Error('加载失败');
        }
      } catch (error) {
        showNotification('加载失败，请检查配置', 'error');
      }
    }
    
    // 加载云存储文件列表
    async function loadCloudFiles() {
      if (!config.cloud.url) {
        showNotification('请先配置云存储地址', 'error');
        return;
      }
      
      showNotification('加载云存储文件列表中...', 'warning');
      
      try {
        // 这里需要根据你的GoIndex/云存储API进行调整
        // 以下是一个示例，你需要根据实际的API修改
        const url = `${config.cloud.url.replace(/\/$/, '')}/api/list?path=${encodeURIComponent(config.cloud.path)}`;
        
        const headers = {};
        if (config.cloud.password) {
          headers['Authorization'] = `Bearer ${config.cloud.password}`;
        }
        
        const response = await fetch(url, { headers });
        
        if (response.ok) {
          const data = await response.json();
          // 假设API返回的数据结构是 { files: [] }
          const files = data.files || data.data || data;
          renderFileList(files, 'cloud');
          showNotification('文件列表已更新', 'success');
        } else {
          // 尝试另一种常见的API格式
          const altResponse = await fetch(config.cloud.url);
          if (altResponse.ok) {
            const text = await altResponse.text();
            // 如果是HTML页面，可能需要解析DOM
            showNotification('成功连接到云存储，但需要解析页面', 'warning');
            
            // 这里可以添加HTML解析逻辑
            // 或者提示用户使用正确的API地址
            showNotification('请确保使用正确的API地址', 'error');
          } else {
            throw new Error('连接失败');
          }
        }
      } catch (error) {
        showNotification('加载失败：' + error.message, 'error');
      }
    }
    
    // 渲染文件列表
    function renderFileList(files, mode) {
      const fileList = document.getElementById('fileList');
      
      if (!files || files.length === 0) {
        fileList.innerHTML = '<div class="loading">暂无文件</div>';
        return;
      }
      
      let html = '';
      
      files.forEach(file => {
        const isDir = file.type === 'dir' || (mode === 'cloud' && file.type === 'folder');
        const icon = isDir ? '📁' : getFileIcon(file.name);
        const size = formatFileSize(file.size);
        const date = formatDate(file.updated_at || file.mtime || file.lastModified);
        
        html += `
          <div class="file-item">
            <div class="file-icon">${icon}</div>
            <div class="file-info">
              <div class="file-name">${file.name}</div>
              <div class="file-meta">
                ${isDir ? '<span class="file-type">文件夹</span>' : `<span class="file-size">${size}</span>`}
                <span class="file-date">${date}</span>
              </div>
            </div>
            <div class="file-actions-cell">
              ${isDir ? 
                `<button class="btn-icon btn-view" onclick="enterFolder('${file.name}', '${mode}')">打开</button>` :
                `<button class="btn-icon btn-download" onclick="downloadFile('${file.name}', '${file.download_url || file.url}', '${mode}')">下载</button>`
              }
              <button class="btn-icon btn-delete" onclick="deleteFile('${file.name}', '${file.path || file.name}', '${mode}')">删除</button>
            </div>
          </div>
        `;
      });
      
      fileList.innerHTML = html;
    }
    
    // 获取文件图标
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const icons = {
        txt: '📝', pdf: '📕', doc: '📘', docx: '📘',
        xls: '📗', xlsx: '📗', ppt: '📙', pptx: '📙',
        zip: '🗜️', rar: '🗜️', '7z': '🗜️',
        mp3: '🎵', wav: '🎵', m4a: '🎵',
        mp4: '🎬', avi: '🎬', mkv: '🎬',
        jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️',
        html: '🌐', js: '📜', css: '🎨', json: '📋'
      };
      return icons[ext] || '📄';
    }
    
    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0 || !bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    // 格式化日期
    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      return date.toLocaleDateString('zh-CN');
    }
    
    // 进入文件夹
    function enterFolder(folderName, mode) {
      if (mode === 'github') {
        // GitHub进入子文件夹逻辑
        showNotification(`进入文件夹: ${folderName}`, 'warning');
        // 这里需要实现GitHub的文件夹导航
      } else {
        // 云存储进入子文件夹
        config.cloud.path = `${config.cloud.path.replace(/\/$/, '')}/${folderName}`;
        document.getElementById('cloudPath').value = config.cloud.path;
        saveConfig('cloud');
        loadCloudFiles();
      }
    }
    
    // 下载文件
    function downloadFile(filename, url, mode) {
      if (mode === 'github') {
        // GitHub文件下载
        if (!url) {
          url = `https://raw.githubusercontent.com/${config.github.repo}/${config.github.branch}/${filename}`;
        }
        window.open(url, '_blank');
      } else {
        // 云存储文件下载
        // 这里需要根据你的云存储API生成下载链接
        const downloadUrl = `${config.cloud.url.replace(/\/$/, '')}/download?path=${encodeURIComponent(config.cloud.path + '/' + filename)}`;
        window.open(downloadUrl, '_blank');
      }
    }
    
    // 删除文件
    async function deleteFile(filename, path, mode) {
      if (!confirm(`确定要删除 ${filename} 吗？`)) return;
      
      if (mode === 'github') {
        showNotification('GitHub文件删除功能需要API支持', 'warning');
        // GitHub删除文件需要额外的API调用
      } else {
        showNotification('云存储文件删除功能需要API支持', 'warning');
      }
    }
    
    // 上传文件
    function uploadFile() {
      document.getElementById('fileInput').click();
    }
    
    // 触发文件输入
    function triggerFileInput() {
      document.getElementById('fileInput').click();
    }
    
    // 初始化上传区域
    function initUploadArea() {
      const uploadArea = document.getElementById('uploadArea');
      
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, preventDefaults, false);
      });
      
      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }
      
      ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, () => {
          uploadArea.classList.add('dragover');
        }, false);
      });
      
      ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, () => {
          uploadArea.classList.remove('dragover');
        }, false);
      });
      
      uploadArea.addEventListener('drop', handleDrop, false);
    }
    
    // 处理拖放
    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleFiles(files);
    }
    
    // 处理文件选择
    function handleFileSelect(e) {
      const files = e.target.files;
      handleFiles(files);
    }
    
    // 处理文件上传
    async function handleFiles(files) {
      if (files.length === 0) return;
      
      showNotification(`准备上传 ${files.length} 个文件...`, 'warning');
      
      if (currentMode === 'github') {
        // GitHub文件上传（适用于小文件）
        for (let i = 0; i < files.length; i++) {
          await uploadToGitHub(files[i]);
        }
      } else {
        // 云存储文件上传（适用于大文件）
        for (let i = 0; i < files.length; i++) {
          await uploadToCloud(files[i]);
        }
      }
    }
    
    // 上传到GitHub
    async function uploadToGitHub(file) {
      if (file.size > 25 * 1024 * 1024) {
        showNotification(`文件 ${file.name} 超过25MB，请使用云存储模式`, 'error');
        return;
      }
      
      try {
        showNotification(`上传 ${file.name} 到GitHub...`, 'warning');
        
        // 这里需要实现GitHub的文件上传API
        // 由于涉及Git API，这里只做演示
        showNotification(`GitHub上传功能需要实现Git API调用`, 'warning');
        
      } catch (error) {
        showNotification(`上传失败: ${error.message}`, 'error');
      }
    }
    
    // 上传到云存储
    async function uploadToCloud(file) {
      try {
        showNotification(`上传 ${file.name} 到云存储...`, 'warning');
        
        // 这里需要实现云存储的上传API
        // 示例：通过FormData上传
        const formData = new FormData();
        formData.append('file', file);
        formData.append('path', config.cloud.path);
        
        if (config.cloud.password) {
          formData.append('password', config.cloud.password);
        }
        
        const response = await fetch(`${config.cloud.url.replace(/\/$/, '')}/upload`, {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          showNotification(`${file.name} 上传成功`, 'success');
          // 刷新文件列表
          if (currentMode === 'cloud') {
            loadCloudFiles();
          }
        } else {
          throw new Error('上传失败');
        }
      } catch (error) {
        showNotification(`上传失败: ${error.message}`, 'error');
      }
    }
    
    // 新建文件夹
    function createFolder() {
      const folderName = prompt('请输入文件夹名称:');
      if (!folderName) return;
      
      if (currentMode === 'github') {
        showNotification('GitHub创建文件夹功能需要API支持', 'warning');
      } else {
        showNotification('云存储创建文件夹功能需要API支持', 'warning');
      }
    }
    
    // 显示通知
    function showNotification(message, type = 'info') {
      // 移除之前的通知
      const oldNotifications = document.querySelectorAll('.notification');
      oldNotifications.forEach(n => n.remove());
      
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.innerHTML = message;
      
      document.body.appendChild(notification);
      
      // 3秒后自动移除
      setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transform = 'translateX(100%)';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }
  </script>
</body>
